<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Ivy Lee Planner</title>
  <meta name="description" content="A focused Ivy Lee daily planning app." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Plan tomorrow. Execute today.</div>
        <h1 class="brand">Ivy Lee Planner</h1>
      </div>
      <button id="signOutBtn" class="btn ghost hidden" type="button">Sign out</button>
    </header>

    <main id="mainView" class="main-view"></main>

    <nav class="bottom-nav">
      <button class="nav-btn nav-btn-active" type="button">Today</button>
      <button class="nav-btn" type="button" disabled>Plan</button>
      <button class="nav-btn" type="button" disabled>History</button>
      <button class="nav-btn" type="button" disabled>Settings</button>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
